server:
  port: 8085
  address: 0.0.0.0

spring:
  application:
    name: ms-bodegas
  profiles:
    active: dev


  datasource:
    url: jdbc:mysql://localhost:3306/db_bodega
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ====================================================================
  # OPCIÓN 2: CONEXIÓN ORACLE DE TU COMPAÑERO (COMENTADA PARA FUTURO USO)
  # ====================================================================
  # datasource:
  #   url: jdbc:oracle:thin:@localhost:1521:XE
  #   username: SCHEMA_BODEGAS
  #   password: FullStack-Bodega1
  #   driver-class-name: oracle.jdbc.OracleDriver

  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# EUREKA  PARA DOCKER
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuración limpia de Swagger para Spring Boot 3.x
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: "info,health,beans"


