    fetch-registry: true
    service-url:
    
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: "info,health,beans"
